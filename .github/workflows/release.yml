name: Release

# Builds multi-platform binaries and attaches them to a (draft) GitHub Release when a
# version tag (vX.Y.Z) is pushed. The Docker image is published separately and is not
# built here. Cut a release by pushing a tag: `git tag vX.Y.Z && git push origin --tags`.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, ext: "" }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, ext: "" }
          - { os: macos-latest, target: x86_64-apple-darwin, ext: "" }
          - { os: macos-latest, target: aarch64-apple-darwin, ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup show
          rustup target add ${{ matrix.target }}
      # aarch64 Linux is cross-compiled from an x86_64 runner: this installs the cross
      # linker/gcc and sets the target env so the C deps build for the target.
      - name: Set up cross toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build server + cli (release)
        run: cargo build --release --target ${{ matrix.target }} -p nusadb-server -p nusadb-cli
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          BIN_DIR="target/${{ matrix.target }}/release"
          NAME="nusadb-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$NAME"
          cp "$BIN_DIR/nusadb-server${{ matrix.ext }}" "$NAME/" 2>/dev/null || true
          cp "$BIN_DIR/nusa-cli${{ matrix.ext }}" "$NAME/" 2>/dev/null || \
            cp "$BIN_DIR/nusadb-cli${{ matrix.ext }}" "$NAME/" 2>/dev/null || true
          cp README.md LICENSE "$NAME/" 2>/dev/null || true
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "dist/$NAME.zip" "$NAME"
          else
            tar czf "dist/$NAME.tar.gz" "$NAME"
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nusadb-${{ matrix.target }}
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: true # review before publishing
